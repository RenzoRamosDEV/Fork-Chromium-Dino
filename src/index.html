<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- color-scheme avisa al navegador del soporte dark/light para evitar flash -->
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Dinochorme — la versión custom del dino de Chrome hecha por Renzo. Compite en el leaderboard global, personaliza tu perfil y desbloquea el modo rainbow.">
  <meta name="author" content="Renzo">
  <meta name="keywords" content="dinochorme, dino game, chrome dinosaur, juego dinosaurio, renzo, leaderboard, offline game">

  <!-- Open Graph para compartir en redes sociales -->
  <meta property="og:title" content="Dinochorme">
  <meta property="og:description" content="La versión custom del dino de Chrome hecha por Renzo. Compite en el leaderboard global y desbloquea el modo rainbow.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Dinochorme by Renzo">
  <meta property="og:image" content="images/default_100_percent/offline/100-offline-sprite.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dinochorme">
  <meta name="twitter:description" content="La versión custom del dino de Chrome hecha por Renzo. Compite en el leaderboard global y desbloquea el modo rainbow.">
  <meta name="twitter:image" content="images/default_100_percent/offline/100-offline-sprite.png">

  <!-- Favicon: sprite del dino recortado del sprite sheet del juego -->
  <link rel="icon" type="image/png" href="images/default_100_percent/offline/100-offline-sprite.png">
  <title>Dinochorme</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <div class="side-col side-col-left">
    <img src="images/side-pattern.jpg" alt="">
  </div>
  <div class="side-col side-col-right">
    <img src="images/side-pattern.jpg" alt="">
  </div>

  <!-- Leaderboard global -->
  <div id="leaderboard-panel">
    <div id="profile-login-wrap">
      <button id="profile-login-btn">🔑 LOGIN CON CÓDIGO</button>
      <div id="profile-login-form" style="display:none">
        <input id="profile-login-input" type="text" placeholder="Pega tu código aquí...">
        <button id="profile-login-submit">Entrar</button>
        <span id="profile-login-msg"></span>
      </div>
    </div>
    <div id="leaderboard-inner">
      <div id="leaderboard-title">🏆 TOP JUGADORES</div>
      <div id="leaderboard-list"></div>
    </div>
  </div>

  <!--
    Contenedor principal del juego.
    Runner.initializeInstance('.interstitial-wrapper') inyecta aquí
    el div .runner-container con el canvas del juego.
  -->
  <!-- Sección de perfil y puntuación -->
  <div id="profile-panel">
    <div id="profile-avatar-section">
      <div id="profile-avatar-wrap">
        <img id="profile-avatar" src="" alt="Avatar">
        <div id="profile-avatar-placeholder">?</div>
        <input id="profile-upload-file" type="file" accept="image/*">
      </div>
    </div>
    <div id="profile-info">
      <input id="profile-name-input" type="text" placeholder="Tu nombre..." maxlength="24">
      <div id="profile-score-label">MEJOR PUNTUACIÓN</div>
      <div id="profile-score">00000</div>
      <div id="profile-last-label">ÚLTIMA PUNTUACIÓN</div>
      <div id="profile-last-score">00000</div>
    </div>
  </div>
  <div id="profile-code-bar">
    <span id="profile-code-label">⚠️ NO COMPARTAS TU CÓDIGO DE PERFIL</span>
    <span id="profile-code-value">—</span>
    <button id="profile-code-copy">Copiar</button>
  </div>

  <div class="interstitial-wrapper">
    <!--
      Elemento requerido por Runner.init(): busca '.icon-offline' y lo oculta.
      En Chromium era el icono del dinosaurio estático de la error page.
      En standalone simplemente debe existir en el DOM.
    -->
    <div class="icon-offline" aria-hidden="true"></div>
  </div>

  <!--
    Recursos del juego: sprites y sonidos.
    Están ocultos con CSS (display: none) pero Runner los lee con querySelector.

    Runner.loadImages() busca:
      - #offline-resources-1x → sprite sheet a resolución normal (1x)
      - #offline-resources-2x → sprite sheet a resolución Retina (2x / HiDPI)
    Selecciona automáticamente el correcto según window.devicePixelRatio.

    Runner.loadSounds() busca <template id="audio-resources"> y extrae
    los elementos <audio> de su contenido para decodificarlos como AudioBuffer.
  -->
  <div id="offline-resources">
    <img id="offline-resources-1x"
         src="images/default_100_percent/offline/100-offline-sprite.png"
         alt="">
    <img id="offline-resources-2x"
         src="images/default_200_percent/offline/200-offline-sprite.png"
         alt="">

    <template id="audio-resources">
      <!-- Sonido al saltar / iniciar el juego -->
      <audio id="offline-sound-press" src="sounds/button-press.mp3"></audio>
      <!-- Sonido al chocar contra un obstáculo -->
      <audio id="offline-sound-hit" src="sounds/hit.mp3"></audio>
      <!-- Sonido al superar un múltiplo de 100 puntos -->
      <audio id="offline-sound-reached" src="sounds/score-reached.mp3"></audio>
    </template>
  </div>

  <!-- Panel de color para filtrar el sprite del dinosaurio -->
  <div id="color-panel">
    <div id="cp-header">COLOR DEL JUEGO</div>
    <div id="cp-body">
      <div id="cp-left">
        <div id="cp-gradient-wrap">
          <canvas id="cp-gradient" width="160" height="140"></canvas>
          <div id="cp-grad-cursor"></div>
        </div>
        <div id="cp-hue-wrap">
          <canvas id="cp-hue" width="18" height="140"></canvas>
          <div id="cp-hue-cursor"></div>
        </div>
      </div>
      <div id="cp-right">
        <div class="cp-row"><span class="cp-label">RGB</span></div>
        <div class="cp-row">
          <span class="cp-ch">R</span><input id="cp-r" type="number" min="0" max="255" value="0">
          <span class="cp-ch">G</span><input id="cp-g" type="number" min="0" max="255" value="102">
          <span class="cp-ch">B</span><input id="cp-b" type="number" min="0" max="255" value="204">
        </div>
        <div class="cp-row"><span class="cp-label">HSV</span></div>
        <div class="cp-row">
          <span class="cp-ch">H</span><input id="cp-h" type="number" min="0" max="360" value="210">
          <span class="cp-ch">S</span><input id="cp-s" type="number" min="0" max="100" value="100">
          <span class="cp-ch">V</span><input id="cp-v" type="number" min="0" max="100" value="80">
        </div>
        <div class="cp-row"><span class="cp-label">HSL</span></div>
        <div class="cp-row">
          <span class="cp-ch">H</span><input id="cp-hl" type="number" min="0" max="360" value="210">
          <span class="cp-ch">S</span><input id="cp-sl" type="number" min="0" max="100" value="100">
          <span class="cp-ch">L</span><input id="cp-l" type="number" min="0" max="100" value="40">
        </div>
        <div class="cp-row cp-hex-row">
          <span class="cp-label-hex">HEX</span>
          <input id="cp-hex" type="text" value="#0066cc">
          <div id="cp-preview"></div>
        </div>
      </div>
      <div id="cp-actions">
        <button id="cp-reset">Reset</button>
        <button id="cp-especial">Especial</button>
      </div>
    </div>
  </div>
  <!--X180904250507X-->
  <script type="module" src="main.ts"></script>
</body>
</html>
